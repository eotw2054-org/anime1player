name = "animeplayer-sync"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Secrets（唔寫喺度，用 `wrangler secret put` 設定）：
#   TURSO_DATABASE_URL
#   TURSO_AUTH_TOKEN

# 即時同步 hub（每 user 一個 DO，WebSocket hibernation）。
# new_sqlite_classes = SQLite-backed → free plan 用得到。
[[durable_objects.bindings]]
name = "SYNC_HUB"
class_name = "SyncHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SyncHub"]
